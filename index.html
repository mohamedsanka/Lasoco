<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maamulka Adeega - Inventory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #004d99;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --danger-red: #d9534f;
            --warning-orange: #f0ad4e;
            --border-color: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            color: #1a3a5f;
            margin: 0;
            font-size: 24px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-grow: 1;
            justify-content: flex-end;
        }

        .btn-create {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.3s;
        }

        .search-container {
            position: relative;
        }

        .search-container input {
            padding: 10px 35px 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            width: 250px;
        }

        .search-container i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #f8f9fa;
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
            color: #333;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            color: #444;
        }

        .low-stock { color: var(--danger-red); font-weight: bold; }
        .med-stock { color: var(--warning-orange); font-weight: bold; }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: #f0f4f8;
            border: 1px solid #d1d9e6;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            color: var(--primary-blue);
        }

        .edit-icon {
            font-size: 12px;
            color: #888;
            margin-left: 5px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .controls { justify-content: flex-start; }
            .search-container input { width: 100%; }
            table { font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Maamulka Adeega</h1>
        <div class="controls">
            <button class="btn-create">Create New Item <i class="fas fa-plus"></i></button>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search items...">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Magaca</th>
                <th>Taariikhd date</th>
                <th>Asalka Qty</th>
                <th>Lagaday</th>
                <th>Haray</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
</div>

<script>
    const inventoryData = [
        { id: 1, name: "iPhone 13", date: "10/26/23", asalka: 100, lagaday: 20 },
        { id: 2, name: "iPhone 13 (Red)", date: "10/26/23", asalka: 150, lagaday: 20 },
        { id: 3, name: "Samsung Galaxy S21", date: "10/27/23", asalka: 150, lagaday: 45 },
        { id: 4, name: "MacBook Air M1 (Gold)", date: "10/27/23", asalka: 80, lagaday: 5 },
        { id: 5, name: "MacBook Air M1 (Renewed)", date: "10/27/23", asalka: 80, lagaday: 15 },
        { id: 6, name: "Logitech Air M1", date: "10/27/23", asalka: 200, lagaday: 60 },
        { id: 7, name: "Logitech Mouse MX Master 3", date: "10/27/23", asalka: 200, lagaday: 60 },
        { id: 8, name: "Dell XPS 13 Laptop", date: "10/27/23", asalka: 90, lagaday: 30 },
        { id: 9, name: "Charger", date: "10/27/23", asalka: 20, lagaday: 25 },
        { id: 10, name: "flask", date: "10/27/23", asalka: 50, lagaday: 40 }
    ];

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        data.forEach((item, index) => {
            const haray = item.asalka - item.lagaday;
            let harayClass = '';
            
            // Logic for color coding "Haray" (Remaining)
            if (haray <= 5) harayClass = 'low-stock';
            else if (haray <= 10) harayClass = 'med-stock';

            const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td>**${item.name}**</td>
                    <td>${item.date}</td>
                    <td>${item.asalka}</td>
                    <td>${item.lagaday} <i class="fas fa-edit edit-icon"></i></td>
                    <td class="${harayClass}">${haray}</td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn"><i class="fas fa-box"></i></button>
                            <button class="action-btn"><i class="fas fa-sync-alt"></i></button>
                        </div>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // Search Functionality
    document.getElementById('searchInput').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const filtered = inventoryData.filter(item => 
            item.name.toLowerCase().includes(term)
        );
        renderTable(filtered);
    });

    // Initial Render
    renderTable(inventoryData);
</script>

</body>
</html>
